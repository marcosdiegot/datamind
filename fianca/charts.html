<style>

.badge{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;border:1px solid rgba(0,229,160,.25);color:var(--green);background:rgba(0,229,160,.07);}

  filterSeg=document.getElementById('fseg').value;

  if(filterUF)b.push(filterUF);else b.push('Nacional');
  if(filterSeg)b.push(filterSeg);
  b.push('Fev/26');
  document.getElementById('badge-ctx').textContent=b.join(' · ');
  renderAll();
}
function resetFilters(){
  filterUF='';filterSeg='';
  document.getElementById('fuf').value='';
  document.getElementById('fseg').value='';
  document.getElementById('badge-ctx').textContent='Nacional · Fev/26';
  renderAll();
}

function renderStats(){
  const ufs=getUFs(),segs=getSegs();
  let totP=0,totS=0;
  ufs.forEach(uf=>segs.forEach(sg=>{totP+=p(uf,sg,C.ultimo);totS+=si(uf,sg,C.ultimo);}));
  const sinVal=totP>0?((totS/totP)*100).toFixed(1)+'%':'—';
  const lider=segs.map(sg=>({sg,v:ufs.reduce((t,uf)=>t+p(uf,sg,C.ultimo),0)})).sort((a,b)=>b.v-a.v)[0];
  document.getElementById('statsrow').innerHTML=
    `<div class="stat"><div class="stat-lbl">Total Mercado</div><div class="stat-val">${fR(totP)}</div><div class="stat-sub">Fev/26</div></div>`+
    `<div class="stat"><div class="stat-lbl">Sinistralidade</div><div class="stat-val" style="color:var(--gold)">${sinVal}</div><div class="stat-sub">média</div></div>`+
    `<div class="stat"><div class="stat-lbl">Seguradoras</div><div class="stat-val">${segs.filter(sg=>ufs.some(uf=>p(uf,sg,C.ultimo)>0)).length}</div><div class="stat-sub">ativas</div></div>`+
    (lider&&!filterSeg?`<div class="stat"><div class="stat-lbl">Líder</div><div class="stat-val" style="font-size:13px;color:${sc(lider.sg)}">${lider.sg.split(' ')[0]}</div><div class="stat-sub">${totP>0?((lider.v/totP)*100).toFixed(1)+'%':'—'}</div></div>`:'');
}

function renderUF(){
  const ufs=getUFs(),segs=getSegs();
  const data=ufs.map(uf=>({uf,v:segs.reduce((t,sg)=>t+p(uf,sg,C.ultimo),0)})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
  document.getElementById('uf-sub').textContent=filterSeg?filterSeg+' · Fev/26':'Fev/26';
  const wrap=document.getElementById('uf-wrap');
  wrap.style.height=Math.max(180,data.length*26+40)+'px';
  const ctx=document.getElementById('cUF');
  if(chartUF)chartUF.destroy();
  const clr=filterSeg?hex2rgba(sc(filterSeg),.8):'rgba(79,142,247,.75)';
  chartUF=new Chart(ctx,{type:'bar',data:{labels:data.map(x=>x.uf),datasets:[{data:data.map(x=>x.v),backgroundColor:clr,borderColor:filterSeg?hex2rgba(sc(filterSeg),1):'rgba(79,142,247,1)',borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(14,16,24,.95)',titleColor:'#E8EAF2',bodyColor:'#9BA3B5',borderColor:'rgba(255,255,255,.1)',borderWidth:1,padding:10,callbacks:{label:ctx=>' '+fR(ctx.raw)}}},animation:{duration:350},scales:{x:{ticks:{color:'#5A5F75',font:{family:'DM Mono',size:9},callback:v=>fR(v)},grid:{color:'rgba(255,255,255,.04)'},border:{display:false}},y:{ticks:{color:'#9BA3B5',font:{family:'Outfit',size:11}},grid:{display:false},border:{display:false}}}}});
}

function renderLine(){
  const ufs=getUFs();
  const ctx=document.getElementById('cLine');
  if(chartLine)chartLine.destroy();
  let datasets=[];
  if(lineTab===0){
    const main=filterSeg&&['Porto Seguro','Tokio Marine'].includes(filterSeg)?[filterSeg]:['Porto Seguro','Tokio Marine'];
    datasets=main.map(sg=>({label:sg,data:C.meses.map(m=>Math.max(0,ufs.reduce((t,uf)=>t+p(uf,sg,m),0))),borderColor:sc(sg),backgroundColor:hex2rgba(sc(sg),.07),fill:true,tension:.4,pointRadius:3,pointBackgroundColor:sc(sg),borderWidth:2.5}));
  } else {
    const excl=['Porto Seguro','Tokio Marine'];
    let segs=filterSeg&&!excl.includes(filterSeg)?[filterSeg]:
      C.segs.filter(sg=>!excl.includes(sg)&&C.meses.reduce((t,m)=>t+ufs.reduce((tt,uf)=>tt+p(uf,sg,m),0),0)>500000)
        .sort((a,b)=>ufs.reduce((t,uf)=>t+p(uf,b,C.ultimo),0)-ufs.reduce((t,uf)=>t+p(uf,a,C.ultimo),0));
    datasets=segs.slice(0,8).map(sg=>({label:sg,data:C.meses.map(m=>Math.max(0,ufs.reduce((t,uf)=>t+p(uf,sg,m),0))),borderColor:sc(sg),backgroundColor:'transparent',tension:.4,pointRadius:2,borderWidth:2}));
  }
  chartLine=new Chart(ctx,{type:'line',data:{labels:C.meses_lbl,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:'#9BA3B5',font:{family:'Outfit',size:10},boxWidth:10,padding:10}},tooltip:{backgroundColor:'rgba(14,16,24,.95)',titleColor:'#E8EAF2',bodyColor:'#9BA3B5',borderColor:'rgba(255,255,255,.1)',borderWidth:1,padding:10,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fR(ctx.raw)}`}}},animation:{duration:350},scales:{x:{ticks:{color:'#5A5F75',font:{family:'DM Mono',size:9},maxRotation:0},grid:{color:'rgba(255,255,255,.04)'},border:{display:false}},y:{ticks:{color:'#5A5F75',font:{family:'DM Mono',size:9},callback:v=>fR(v)},grid:{color:'rgba(255,255,255,.04)'},border:{display:false}}}}});
}

function renderTop5(){
  const ufs=getUFs(),segs=getSegs();
  document.getElementById('var-sub').textContent='Jan→Fev/26'+(filterUF?' · '+filterUF:'');
  const rows=segs.map(sg=>{
    const vU=ufs.reduce((t,uf)=>t+p(uf,sg,C.ultimo),0);
    const vP=ufs.reduce((t,uf)=>t+p(uf,sg,C.prev),0);
    const dr=vU-vP,dp=vP>0?((dr/vP)*100).toFixed(1):null;
    return {sg,vU,dr,dp};
  }).filter(r=>r.vU>0).sort((a,b)=>b.dr-a.dr).slice(0,5);
  const maxV=Math.max(...rows.map(r=>r.vU));
  document.getElementById('top5cards').innerHTML=rows.map(r=>{
    const c=sc(r.sg),up=r.dr>=0;
    return `<div class="t5card"><div class="t5head"><div class="t5name" style="color:${c}">${r.sg}</div><div class="t5delta ${up?'up':'dn'}">${up?'+':''}${fR(r.dr)}</div></div><div class="t5bar-bg"><div class="t5bar-fill" style="width:${(r.vU/maxV*100).toFixed(1)}%;background:${c}"></div></div><div class="t5foot"><span>Vol: <b>${fR(r.vU)}</b></span><span style="color:${up?'var(--green)':'var(--red)'}">${r.dp!==null?(up?'+':'')+r.dp+'%':'—'}</span></div></div>`;
  }).join('');
}

function sinCls(v){if(!v||v<=0)return 'td-sin';if(v<40)return 'td-sin sin-ok';if(v<70)return 'td-sin sin-med';return 'td-sin sin-hi';}

function renderTable(){
  const ufs=getUFs(),segs=getSegs(),t=document.getElementById('tbl');

  if(tblTab===0){
    // Tabela por seguradora
    // Denominador do share = total do estado selecionado (todas as segs) OU total nacional (todas as segs, todos os estados)
    const allSegs=C.segs;
    const denomUFs=filterUF?[filterUF]:C.ufs;
    const denom=allSegs.reduce((tt,sg)=>tt+denomUFs.reduce((t2,uf)=>t2+p(uf,sg,C.ultimo),0),0);

    const rows=segs.map(sg=>{
      const totP=ufs.reduce((tt,uf)=>tt+p(uf,sg,C.ultimo),0);
      const totS=ufs.reduce((tt,uf)=>tt+si(uf,sg,C.ultimo),0);
      return {sg,totP,totS};
    }).filter(r=>r.totP>0).sort((a,b)=>b.totP-a.totP);

    t.innerHTML='<thead><tr><th>Seguradora</th><th>Prêmio</th><th>Sinistral.</th><th>Share'+(filterUF?' '+filterUF:'')+'</th></tr></thead><tbody>'+
      rows.map(r=>{
        const sh=(denom>0?(r.totP/denom*100):0).toFixed(1);
        const sin=r.totP>0?Number((r.totS/r.totP*100).toFixed(1)):null;
        return `<tr><td><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${sc(r.sg)};margin-right:6px;vertical-align:middle"></span>${r.sg}</td><td class="td-v">${fR(r.totP)}</td><td class="${sinCls(sin)}">${sin&&sin>0?sin+'%':'—'}</td><td class="td-sh">${sh}%</td></tr>`;
      }).join('')+'</tbody>';

  } else {
    // Tabela por UF
    // Share = prêmio da seg (ou todas) naquele UF / total do UF (SEMPRE todas as segs)
    const rows=ufs.map(uf=>{
      const totP=segs.reduce((tt,sg)=>tt+p(uf,sg,C.ultimo),0);
      const totS=segs.reduce((tt,sg)=>tt+si(uf,sg,C.ultimo),0);
      // Denominador: total do estado com TODAS as seguradoras (ignora filtro de seg)
      const totalUF=C.segs.reduce((tt,sg)=>tt+Math.max(0,(C.cubo[uf]?.[sg]?.[C.ultimo]?.[0])||0),0);
      return {uf,totP,totS,totalUF};
    }).filter(r=>r.totP>0).sort((a,b)=>b.totP-a.totP);

    const lbl=filterSeg?`Share em UF`:'Share';
    t.innerHTML='<thead><tr><th>UF</th><th>Prêmio</th><th>Sinistral.</th><th>'+lbl+'</th></tr></thead><tbody>'+
      rows.map(r=>{
        // Share = prêmio filtrado / total do estado (todas as segs)
        const sh=(r.totalUF>0?(r.totP/r.totalUF*100):0).toFixed(1);
        const sin=r.totP>0?Number((r.totS/r.totP*100).toFixed(1)):null;
        return `<tr><td style="font-family:'DM Mono',monospace;font-size:12px">${r.uf}</td><td class="td-v">${fR(r.totP)}</td><td class="${sinCls(sin)}">${sin&&sin>0?sin+'%':'—'}</td><td class="td-sh">${sh}%</td></tr>`;
      }).join('')+'</tbody>';
  }
}

function switchLine(i){lineTab=i;document.getElementById('lt0').classList.toggle('on',i===0);document.getElementById('lt1').classList.toggle('on',i===1);renderLine();}
function switchTable(i){tblTab=i;document.getElementById('tt0').classList.toggle('on',i===0);document.getElementById('tt1').classList.toggle('on',i===1);renderTable();}
function renderAll(){renderStats();renderUF();renderLine();renderTop5();renderTable();}

Chart.defaults.color='#5A5F75';
Chart.defaults.font.family='Outfit';
initFilters();
renderAll();
</script>
</body>
</html>
